version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_PORT: 4000
      BACKEND_HOST: 0.0.0.0
      DATABASE_URL: file:/app/data/streamvault.db
      REDIS_URL: redis://redis:6379
      USE_REDIS: "true"
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string_min_32_chars}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-streamvault}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.sh}
      NTFY_DEFAULT_TOPIC: ${NTFY_DEFAULT_TOPIC:-streamvault-alerts}
      EXPORT_INTERVAL_HOURS: "6"
      EXPORT_DIR: /app/exports
      LOG_LEVEL: info
    volumes:
      - backend_data:/app/data
      - backend_exports:/app/exports
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  redis_data:
  backend_data:
  backend_exports:
