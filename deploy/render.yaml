services:
  - type: web
    name: streamvault-backend
    runtime: docker
    dockerfilePath: ./docker/backend.Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService: { type: redis, name: streamvault-redis, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 5

  - type: web
    name: streamvault-frontend
    runtime: docker
    dockerfilePath: ./docker/frontend.Dockerfile
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false

  - type: redis
    name: streamvault-redis
    plan: free
    ipAllowList: []
